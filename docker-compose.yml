services:
  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4223:4222"   # TCP: api + worker (host 4223 — 4222 taken by another project's nats)
      - "8081:8080"   # WebSocket: browser (nats.ws) (host 8081)
      - "8223:8222"   # monitoring (host 8223)
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vidgen
      POSTGRES_PASSWORD: vidgen
      POSTGRES_DB: vidgen
    ports:
      - "5433:5432"   # host 5433 — matches api/src's local-dev default DATABASE_URL
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      - nats
      - postgres
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgres://vidgen:vidgen@postgres:5432/vidgen
      COST_CAP_USD: "0.15"
      PORT: "8080"
      SPA_DIR: /app/public
      MEDIA_DIR: /app/media
      # config.yaml (same file the worker mounts) is the single source of truth
      # for provider selection; the api reads tts.provider from it to serve
      # GET /api/config { ttsProvider } so the SPA can gate voice/speed controls.
      CONFIG_PATH: /app/config.yaml
      # Single-user login. Set AUTH_PASSWORD (and SESSION_SECRET) in your
      # gitignored .env — never commit the password. If AUTH_PASSWORD is unset
      # the api generates a random per-boot password (logged) and login is
      # effectively disabled until you set it. SESSION_SECRET signs the
      # vg_session cookie; set a stable value so restarts don't drop sessions.
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Agent SDK auth for GenerateScript. The SDK bundles its own runtime, so
      # no claude binary is needed — only credentials. A Claude subscription
      # OAuth token (from `claude setup-token`) or ANTHROPIC_API_KEY works;
      # passed through from the host env, empty if unset.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - media-data:/app/media
      - ./config.yaml:/app/config.yaml:ro

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222   # compose DNS, container-internal port (index §8)
      VIDGEN_ENV_PATH: /app/.env
      VIDGEN_CONFIG_PATH: /app/config.yaml
    env_file:
      - ./.env   # ELEVENLABS_API_KEY, PEXELS_API_KEY, PIXABAY_API_KEY, JAMENDO_CLIENT_ID (gitignored, root CLAUDE.md "Keys")
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      # Same named volume + mount path as api (above) so worker-produced media
      # is served by api's GET /media/* and job DestPaths line up (index §3/§5).
      - media-data:/app/media
    restart: unless-stopped

volumes:
  nats-data:
  postgres-data:
  media-data:
