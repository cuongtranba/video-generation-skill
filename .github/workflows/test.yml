name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ast-grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: ast-grep rule tests
        run: bun run test:sg
      - name: ast-grep scan
        run: bun run lint:sg

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck
      - name: Unit tests (integration suites self-skip without NATS/Postgres)
        run: bun test

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
          cache-dependency-path: worker/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint (oxlint)
        run: bun run lint
      - name: Type check
        run: bun run typecheck
      - name: Unit tests
        run: bun test
      - name: Build
        run: bun run build
